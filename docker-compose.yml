# docker-compose.yml — обновите секции (остальное оставьте как есть):

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload  # ← добавьте --reload для dev
    # volumes:  # ← раскомментируйте для hot-reload в разработке
    #   - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy  # ← ждём, пока БД будет готова
      redis:
        condition: service_started
    restart: unless-stopped  # ← авто-перезапуск при падении

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: seopass
      POSTGRES_DB: seodb
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:  # ← проверка готовности БД
      test: ["CMD-SHELL", "pg_isready -U seo -d seodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/code

  openserp:
    image: karust/openserp:latest
    command: serve -a 0.0.0.0 -p 7000
    ports:
      - "7000:7000"
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info 
    env_file: .env
    depends_on:
      - redis
      - postgres

  nginx:
    image: nginx:alpine
    container_name: seo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro  # ← ← ← КРИТИЧНО: монтируем сертификаты
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
