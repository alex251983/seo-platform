

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Используем Python вместо curl (он точно есть в образе)
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  # Даём больше времени на первый старт
    networks:
      - seo-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: seopass
      POSTGRES_DB: seodb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo -d seodb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seo-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - seo-net

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - seo-net

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - seo-net

  openserp:
    image: karust/openserp:latest
    command: serve -a 0.0.0.0 -p 7000
    restart: unless-stopped
    networks:
      - seo-net

  nginx:
    image: nginx:alpine
    container_name: seo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro
      - ./frontend/dist:/usr/share/nginx/html:ro   # <-- добавить эту строку
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - seo-net

networks:
  seo-net:
    driver: bridge

volumes:
pgdata:
