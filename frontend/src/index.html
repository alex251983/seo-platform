<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RankPulse — SEO Dashboard</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-card: #222633;
    --bg-card-hover: #2a2f3e;
    --bg-input: #2a2f3e;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --green: #00cec9;
    --green-soft: rgba(0, 206, 201, 0.15);
    --red: #ff6b6b;
    --red-soft: rgba(255, 107, 107, 0.15);
    --orange: #fdcb6e;
    --orange-soft: rgba(253, 203, 110, 0.15);
    --blue: #74b9ff;
    --blue-soft: rgba(116, 185, 255, 0.15);
    --text-primary: #e8e8f0;
    --text-secondary: #8b8da3;
    --text-muted: #5a5c72;
    --border: #2d3148;
    --border-light: #3d4160;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --sidebar-width: 260px;
    --header-height: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ===== LAYOUT ===== */
  .app { display: flex; min-height: 100vh; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 100;
    transition: var(--transition);
  }

  .sidebar-brand {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: white;
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  .brand-text h2 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-light), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-text span {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    overflow-y: auto;
  }

  .nav-section {
    margin-bottom: 24px;
  }

  .nav-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    padding: 0 12px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    position: relative;
    margin-bottom: 2px;
  }

  .nav-item:hover {
    background: var(--bg-card);
    color: var(--text-primary);
  }

  .nav-item.active {
    background: linear-gradient(135deg, rgba(108, 92, 231, 0.2), rgba(0, 206, 201, 0.1));
    color: var(--accent-light);
    font-weight: 600;
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }

  .nav-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .nav-badge {
    margin-left: auto;
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 700;
  }

  .nav-badge.red { background: var(--red); }
  .nav-badge.green { background: var(--green); color: #000; }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .mode-switcher {
    display: flex;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    padding: 4px;
    gap: 4px;
  }

  .mode-btn {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    transition: var(--transition);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 10px var(--accent-glow);
  }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    margin-left: var(--sidebar-width);
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    height: var(--header-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
  }

  .header-search {
    flex: 1;
    max-width: 400px;
    position: relative;
  }

  .header-search input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
  }

  .header-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .header-search input::placeholder { color: var(--text-muted); }

  .header-search .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .header-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: var(--transition);
    position: relative;
  }

  .header-btn:hover {
    border-color: var(--accent);
    color: var(--accent-light);
    background: var(--bg-card);
  }

  .header-btn .dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid var(--bg-secondary);
  }

  .user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--green));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: white;
    cursor: pointer;
    border: 2px solid transparent;
    transition: var(--transition);
  }

  .user-avatar:hover { border-color: var(--accent); }

  /* ===== CONTENT ===== */
  .content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
  }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== PAGE HEADER ===== */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .page-title h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .page-title p {
    color: var(--text-secondary);
    font-size: 14px;
  }

  .page-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b7cf7);
    color: white;
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }

  .btn-secondary {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    background: var(--bg-card-hover);
  }

  .btn-success {
    background: linear-gradient(135deg, #00b894, var(--green));
    color: #000;
  }

  .btn-danger {
    background: var(--red-soft);
    color: var(--red);
    border: 1px solid rgba(255,107,107,0.2);
  }

  .btn-danger:hover { background: rgba(255,107,107,0.25); }

  .btn-sm { padding: 6px 14px; font-size: 12px; }

  .btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition);
    font-size: 14px;
  }

  .btn-icon:hover { border-color: var(--accent); color: var(--accent-light); }

  /* ===== STATS CARDS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .stat-card:hover {
    border-color: var(--border-light);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .stat-card.purple::after { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
  .stat-card.green::after { background: linear-gradient(90deg, #00b894, var(--green)); }
  .stat-card.orange::after { background: linear-gradient(90deg, #e17055, var(--orange)); }
  .stat-card.blue::after { background: linear-gradient(90deg, #0984e3, var(--blue)); }

  .stat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .stat-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .stat-icon.purple { background: rgba(108,92,231,0.15); color: var(--accent-light); }
  .stat-icon.green { background: var(--green-soft); color: var(--green); }
  .stat-icon.orange { background: var(--orange-soft); color: var(--orange); }
  .stat-icon.blue { background: var(--blue-soft); color: var(--blue); }

  .stat-value {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .stat-change {
    font-size: 12px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .stat-change.up { color: var(--green); background: var(--green-soft); }
  .stat-change.down { color: var(--red); background: var(--red-soft); }

  /* ===== CARDS ===== */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: var(--transition);
  }

  .card:hover { border-color: var(--border-light); }

  .card-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
  }

  .card-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .card-body { padding: 20px; }
  .card-body.no-pad { padding: 0; }

  /* ===== GRID LAYOUTS ===== */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  /* ===== TABLE ===== */
  .table-wrapper { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
    white-space: nowrap;
  }

  td {
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(108, 92, 231, 0.03); }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .status.active { background: var(--green-soft); color: var(--green); }
  .status.warning { background: var(--orange-soft); color: var(--orange); }
  .status.error { background: var(--red-soft); color: var(--red); }
  .status.info { background: var(--blue-soft); color: var(--blue); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ===== CHART PLACEHOLDER ===== */
  .chart-container {
    padding: 20px;
    position: relative;
  }

  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 180px;
    padding-top: 10px;
  }

  .chart-bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    height: 100%;
    justify-content: flex-end;
  }

  .chart-bar {
    width: 100%;
    max-width: 32px;
    border-radius: 4px 4px 0 0;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    cursor: pointer;
  }

  .chart-bar:hover { opacity: 0.8; transform: scaleY(1.02); }

  .chart-bar.purple { background: linear-gradient(to top, var(--accent), var(--accent-light)); }
  .chart-bar.green { background: linear-gradient(to top, #00b894, var(--green)); }

  .chart-bar-label {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
  }

  .chart-legend {
    display: flex;
    gap: 20px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .legend-dot.purple { background: var(--accent); }
  .legend-dot.green { background: var(--green); }

  /* ===== SCORE RING ===== */
  .score-ring {
    width: 120px;
    height: 120px;
    position: relative;
    margin: 0 auto;
  }

  .score-ring svg {
    transform: rotate(-90deg);
    width: 120px;
    height: 120px;
  }

  .score-ring circle {
    fill: none;
    stroke-width: 8;
  }

  .score-ring .bg { stroke: var(--bg-input); }

  .score-ring .fill {
    stroke-linecap: round;
    transition: stroke-dashoffset 1.5s ease;
  }

  .score-ring .value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 800;
  }

  /* ===== PROGRESS ===== */
  .progress-bar {
    height: 6px;
    background: var(--bg-input);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  .progress-fill.purple { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
  .progress-fill.green { background: linear-gradient(90deg, #00b894, var(--green)); }
  .progress-fill.orange { background: linear-gradient(90deg, #e17055, var(--orange)); }
  .progress-fill.blue { background: linear-gradient(90deg, #0984e3, var(--blue)); }

  /* ===== LIST ITEMS ===== */
  .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: var(--transition);
  }

  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: rgba(108, 92, 231, 0.03); }

  .list-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .list-content { flex: 1; min-width: 0; }

  .list-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .list-desc {
    font-size: 12px;
    color: var(--text-muted);
  }

  .list-meta {
    text-align: right;
    flex-shrink: 0;
  }

  .list-value {
    font-size: 14px;
    font-weight: 700;
  }

  .list-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ===== KEYWORD TAGS ===== */
  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 20px;
  }

  .keyword-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
  }

  .keyword-tag.top { background: var(--green-soft); color: var(--green); border: 1px solid rgba(0,206,201,0.2); }
  .keyword-tag.mid { background: var(--orange-soft); color: var(--orange); border: 1px solid rgba(253,203,110,0.2); }
  .keyword-tag.low { background: var(--red-soft); color: var(--red); border: 1px solid rgba(255,107,107,0.2); }

  .keyword-tag:hover { transform: scale(1.05); }

  .tag-pos {
    font-weight: 800;
    font-size: 12px;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title { font-size: 18px; font-weight: 700; }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--bg-input);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: var(--transition);
  }

// ===== RENDER FUNCTIONS =====
function renderNav() {
  const nav = document.getElementById('sidebarNav');
  const config = navConfig[currentMode];
  nav.innerHTML = config.map(section => `
    <div class="nav-section">
      <div class="nav-section-title">${section.section}</div>
      ${section.items.map(item => `
        <div class="nav-item ${currentPage === item.id ? 'active' : ''}" onclick="navigate('${item.id}')" role="button" tabindex="0" aria-label="${item.label}">
          <span class="nav-icon">${item.icon}</span>
          <span>${item.label}</span>
          ${item.badge ? `<span class="nav-badge ${item.badgeClass || ''}">${item.badge}</span>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderPage() {
  const content = document.getElementById('content');
  const pageId = currentPage;
  
  // Map admin-dash to internal key
  const renderKey = pageId;
  
  if (pages[renderKey]) {
    content.innerHTML = `<div class="page active">${pages[renderKey]()}</div>`;
  } else {
    content.innerHTML = `
      <div class="page active">
        <div class="empty-state" style="text-align:center;padding:60px 20px">
          <div style="font-size:48px;margin-bottom:16px">🚧</div>
          <h3 style="font-size:20px;margin-bottom:8px">Страница в разработке</h3>
          <p style="color:var(--text-secondary);margin-bottom:24px">Этот раздел скоро будет доступен</p>
          <button class="btn btn-primary" onclick="navigate('dashboard')">← На дашборд</button>
        </div>
      </div>
    `;
  }

  // Initialize charts after rendering
  setTimeout(initCharts, 100);
}

function navigate(pageId) {
  currentPage = pageId;
  renderNav();
  renderPage();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function switchMode(mode) {
  currentMode = mode;
  
  // Update mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.mode === mode) {
      btn.classList.add('active');
    }
  });
  
  // Reset to first page of selected mode
  const firstPage = navConfig[mode][0].items[0].id;
  currentPage = firstPage;
  renderNav();
  renderPage();
  
  showNotification('success', mode === 'admin' ? '⚙️ Режим администратора' : '👤 Режим пользователя');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function showNotification(type, text) {
  const notif = document.getElementById('notification');
  const icon = document.getElementById('notifIcon');
  const txt = document.getElementById('notifText');
  
  // Clear previous timer to prevent conflicts
  if (notifTimer) clearTimeout(notifTimer);
  
  notif.className = 'notification ' + type;
  icon.textContent = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  txt.textContent = text;
  
  notif.classList.add('show');
  notifTimer = setTimeout(() => {
    notif.classList.remove('show');
    notifTimer = null;
  }, 3500);
}

                </div>
            </div>`;
    }
})();

async function doLogin() {
    const btn = document.getElementById('lp-btn');
    const err = document.getElementById('lp-err');
    const email = document.getElementById('lp-email').value;
    const pass = document.getElementById('lp-pass').value;
    btn.disabled = true; btn.innerText = 'Вход...'; err.innerText = '';
    try {
        const res = await fetch('/api/v1/auth/login', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password: pass })
        });
        const data = await res.json();
        if (res.ok && data.access_token) {
            localStorage.setItem('seo_token', data.access_token);
            location.reload();
        } else { err.innerText = data.detail || 'Ошибка авторизации'; }
    } catch (e) { err.innerText = 'Сервер недоступен'; }
    btn.disabled = false; btn.innerText = 'Войти';
}

function logout() { 
    localStorage.removeItem('seo_token'); 
    location.reload(); 
}

function toggleUserMenu() {
    // Placeholder for user menu functionality
    showNotification('info', 'Меню пользователя в разработке');
}

// Add logout button when logged in
if (localStorage.getItem('seo_token')) {
    window.addEventListener('load', () => {
        setTimeout(() => {
            const header = document.querySelector('.header-actions');
            if (header) {
                const btn = document.createElement('button');
                btn.innerHTML = '🚪'; 
                btn.className = 'header-btn';
                btn.setAttribute('data-tooltip', 'Выйти'); 
                btn.setAttribute('aria-label', 'Выйти из системы');
                btn.onclick = logout;
                header.insertBefore(btn, header.firstChild);
            }
        }, 500);
    });
}
