upstream backend {
    server api:8000;
}
upstream frontend {
    server api:8000;
}

# === HTTP → HTTPS редирект ===
server {
    listen 80;
    server_name seoviden.ru www.seoviden.ru;
    return 301 https://$host$request_uri;
}

# === HTTPS сервер ===
server {
    listen 443 ssl http2;
    server_name seoviden.ru www.seoviden.ru;

    # SSL-сертификаты Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/seoviden.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seoviden.ru/privkey.pem;
    
    # Современные протоколы
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # HSTS: запомнить, что сайт только по HTTPS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    
    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Swagger
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Admin
    location /admin {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check (без логов)
    location /health {
        proxy_pass http://backend;
        access_log off;
    }

    # Остальное → пока на бэкенд
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
